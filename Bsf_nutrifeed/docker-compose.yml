version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-prod}
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db.sqlite3}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bsf_nutrifeed
      POSTGRES_USER: bsf_user
      POSTGRES_PASSWORD: bsf_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
